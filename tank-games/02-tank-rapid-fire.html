<script>
(function(){const c=document.getElementById('c'),x=c.getContext('2d'),ov=document.getElementById('ov');let W=0,H=0,d=devicePixelRatio||1;function rs(){const r=c.getBoundingClientRect();W=r.width;H=r.height;c.width=W*d;c.height=H*d;x.setTransform(d,0,0,d,0,0)}rs();addEventListener('resize',rs);const k={},m={x:0,y:0,d:false};let R=false;addEventListener('keydown',e=>{k[e.key.toLowerCase()]=true;if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase()))e.preventDefault()});addEventListener('keyup',e=>k[e.key.toLowerCase()]=false);c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();m.x=e.clientX-r.left;m.y=e.clientY-r.top});c.addEventListener('mousedown',()=>m.d=true);c.addEventListener('mouseup',()=>m.d=false);let P,B,EB,E,O,X,S,L,WV,LS,IV;const BS=14,BL=70,FC=80;function rc(rx,ry,rw,rh,cx,cy,cr){const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));return Math.hypot(cx-nx,cy-ny)<cr}function tm(e,dx,dy){let nx=e.x+dx,bl=false;for(const o of O)if(rc(o.x,o.y,o.w,o.h,nx,e.y,e.r)){bl=true;break}if(nx-e.r<0||nx+e.r>W)bl=true;if(!bl)e.x=nx;let ny=e.y+dy;bl=false;for(const o of O)if(rc(o.x,o.y,o.w,o.h,e.x,ny,e.r)){bl=true;break}if(ny-e.r<0||ny+e.r>H)bl=true;if(!bl)e.y=ny}function sp(px,py,cl,n){for(let i=0;i<n;i++)X.push({x:px,y:py,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:1,c:cl})}function reset(){P={x:W/2,y:H/2,ba:0,ta:0,r:18};B=[];EB=[];E=[];X=[];S=0;L=3;WV=0;LS=0;IV=0;O=[];for(let i=0;i<6;i++)O.push({x:80+Math.random()*(W-160),y:80+Math.random()*(H-160),w:30+Math.random()*40,h:30+Math.random()*40});O=O.filter(o=>Math.hypot(o.x+o.w/2-P.x,o.y+o.h/2-P.y)>100);nw();uh()}function nw(){WV++;for(let i=0;i<2+WV;i++){let ex,ey,t=0;do{ex=40+Math.random()*(W-80);ey=40+Math.random()*(H-80);t++}while(Math.hypot(ex-P.x,ey-P.y)<180&&t<40);E.push({x:ex,y:ey,ba:Math.random()*Math.PI*2,ta:0,r:16,sp:.6+Math.random()*.4,ls:performance.now()+Math.random()*1500,hp:2})}uh()}function uh(){document.getElementById('sc').textContent='Score: '+S;document.getElementById('lv').textContent='Lives: '+L;document.getElementById('wv').textContent='Wave: '+WV}function dt(px,py,ba,ta,bc,tc,r){x.save();x.translate(px,py);x.save();x.rotate(ba);x.fillStyle='#2a2a2a';x.fillRect(-r,-r-3,r*2,5);x.fillRect(-r,r-2,r*2,5);x.fillStyle=bc;x.fillRect(-r+2,-r+2,r*2-4,r*2-4);x.strokeStyle='rgba(0,0,0,.35)';x.lineWidth=1;x.strokeRect(-r+2,-r+2,r*2-4,r*2-4);x.restore();x.rotate(ta);x.fillStyle=tc;x.beginPath();x.arc(0,0,r*.6,0,Math.PI*2);x.fill();x.strokeStyle='rgba(0,0,0,.4)';x.stroke();x.fillStyle='#1a1a1a';x.fillRect(0,-3,r+6,6);x.restore()}function up(t){let f=0,tu=0;if(k.w||k.arrowup)f++;if(k.s||k.arrowdown)f--;if(k.a||k.arrowleft)tu--;if(k.d||k.arrowright)tu++;P.ba+=tu*.05;tm(P,Math.cos(P.ba)*2.2*f,Math.sin(P.ba)*2.2*f);P.ta=Math.atan2(m.y-P.y,m.x-P.x);if(k[' ']||m.d){const now=performance.now();if(now-LS>FC){LS=now;const a=P.ta,bx=P.x+Math.cos(a)*(P.r+8),by=P.y+Math.sin(a)*(P.r+8);B.push({x:bx,y:by,vx:Math.cos(a)*BS,vy:Math.sin(a)*BS,life:BL});sp(bx,by,'#ffcc66',3)}}if(IV>0)IV-=t;for(const b of B){const steps=3,sx=b.vx/steps,sy=b.vy/steps;for(let s=0;s<steps&&b.life>0;s++){b.x+=sx;b.y+=sy;for(const o of O)if(b.x>o.x&&b.x<o.x+o.w&&b.y>o.y&&b.y<o.y+o.h){b.life=0;sp(b.x,b.y,'#999',5);break}}b.life--}for(const b of EB){b.x+=b.vx;b.y+=b.vy;b.life--;for(const o of O)if(b.x>o.x&&b.x<o.x+o.w&&b.y>o.y&&b.y<o.y+o.h){b.life=0;sp(b.x,b.y,'#999',5)}}for(const e of E){const dx=P.x-e.x,dy=P.y-e.y,dist=Math.hypot(dx,dy);e.ta=Math.atan2(dy,dx);let tb=e.ta;if(dist<160)tb+=Math.PI/2;let da=tb-e.ba;while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;e.ba+=Math.max(-.03,Math.min(.03,da));tm(e,Math.cos(e.ba)*e.sp,Math.sin(e.ba)*e.sp);const now=performance.now();if(now-e.ls>1400+Math.random()*800&&dist<320){e.ls=now;const a=e.ta,bx=e.x+Math.cos(a)*(e.r+6),by=e.y+Math.sin(a)*(e.r+6);EB.push({x:bx,y:by,vx:Math.cos(a)*5,vy:Math.sin(a)*5,life:120});sp(bx,by,'#ff8866',3)}}for(const b of B){if(b.life<=0)continue;for(const e of E)if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){b.life=0;e.hp--;if(e.hp<=0){sp(e.x,e.y,'#ff6644',20);S+=100}else sp(b.x,b.y,'#ffaa66',6)}}for(let i=E.length-1;i>=0;i--)if(E[i].hp<=0)E.splice(i,1);for(const b of EB){if(b.life<=0||IV>0)continue;if(Math.hypot(b.x-P.x,b.y-P.y)<P.r){b.life=0;L--;IV=90;sp(P.x,P.y,'#ffaa44',25);if(L<=0){eg();return}}}for(const e of E)if(Math.hypot(e.x-P.x,e.y-P.y)<e.r+P.r&&IV<=0){L--;IV=90;sp(P.x,P.y,'#ffaa44',20);const a=Math.atan2(P.y-e.y,P.x-e.x);P.x+=Math.cos(a)*15;P.y+=Math.sin(a)*15;if(L<=0){eg();return}}B=B.filter(b=>b.life>0&&b.x>0&&b.x<W&&b.y>0&&b.y<H);EB=EB.filter(b=>b.life>0&&b.x>0&&b.x<W&&b.y>0&&b.y<H);for(const p of X){p.x+=p.vx;p.y+=p.vy;p.vx*=.92;p.vy*=.92;p.life-=.04}X=X.filter(p=>p.life>0);if(E.length===0)nw();uh()}function rn(){x.clearRect(0,0,W,H);x.fillStyle='#4a5d3a';x.fillRect(0,0,W,H);x.strokeStyle='rgba(0,0,0,.07)';x.lineWidth=1;for(let i=0;i<W;i+=32){x.beginPath();x.moveTo(i,0);x.lineTo(i,H);x.stroke()}for(let i=0;i<H;i+=32){x.beginPath();x.moveTo(0,i);x.lineTo(W,i);x.stroke()}for(const o of O){x.fillStyle='#6b5a3e';x.fillRect(o.x,o.y,o.w,o.h);x.strokeStyle='#3d3421';x.lineWidth=1.5;x.strokeRect(o.x,o.y,o.w,o.h)}for(const e of E)dt(e.x,e.y,e.ba,e.ta,'#c23a2a','#8a2818',e.r);if(IV<=0||Math.floor(IV/6)%2===0)dt(P.x,P.y,P.ba,P.ta,'#3a7bc2','#1f5588',P.r);x.strokeStyle='#ffd966';x.lineWidth=3;x.lineCap='round';for(const b of B){x.beginPath();x.moveTo(b.x-b.vx*.5,b.y-b.vy*.5);x.lineTo(b.x,b.y);x.stroke()}x.fillStyle='#ff6a4a';for(const b of EB){x.beginPath();x.arc(b.x,b.y,3,0,Math.PI*2);x.fill()}for(const p of X){x.globalAlpha=Math.max(0,p.life);x.fillStyle=p.c;x.fillRect(p.x-1.5,p.y-1.5,3,3)}x.globalAlpha=1}let lt=0;function lp(t){if(!R)return;const dt2=Math.min(2,(t-lt)/16.67);lt=t;up(dt2);rn();requestAnimationFrame(lp)}function eg(){R=false;ov.style.display='flex';ov.innerHTML='<div style="font-size:22px;font-weight:600;margin-bottom:8px">Game Over</div><div style="font-size:14px;margin-bottom:16px;opacity:.9">Score:
